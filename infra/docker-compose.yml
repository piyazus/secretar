version: "3.9"

# Secretar — self-hosted инфраструктура (ТЗ §6-7).
# Всё, кроме LLM API (Anthropic), крутится на одном VPS.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secretar}
      POSTGRES_USER: ${POSTGRES_USER:-secretar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secretar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [secretar-net]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_HOST: ${N8N_HOST:-n8n.localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      NODE_ENV: production
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:?required}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?required}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-secretar}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-secretar}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?required}
      # Для router.json: вызовы Anthropic и внутреннего /api/agent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_COMPLEX_MODEL: ${LLM_COMPLEX_MODEL:-claude-sonnet-5}
      LLM_ROUTING_MODEL: ${LLM_ROUTING_MODEL:-claude-haiku-4-5-20251001}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    volumes:
      - n8n-data:/home/node/.n8n
      - ../n8n:/workflows:ro
    networks: [secretar-net]

  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-medium}
    volumes:
      - whisper-cache:/root/.cache
    networks: [secretar-net]

  frontend:
    build:
      # Контекст — корень репозитория: приложению нужен и frontend/, и lib/
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on: [postgres, n8n]
    env_file:
      - ../.env
    networks: [secretar-net]

  # Cloudflare Tunnel — публичный доступ без открытия портов (домашний ПК).
  # TLS терминируется на Cloudflare; ingress (hostname → сервис) настраивается
  # в дашборде Zero Trust → Networks → Tunnels:
  #   app.<домен>  → http://frontend:3000
  #   n8n.<домен>  → http://n8n:5678
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${TUNNEL_TOKEN:?TUNNEL_TOKEN must be set (Zero Trust -> Tunnels)}
    depends_on: [frontend, n8n]
    networks: [secretar-net]

  # Caddy оставлен для локального доступа по LAN (http://<ip-компа>).
  # За туннелем не нужен ACME — отдаём просто HTTP на :80.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [frontend, n8n]
    ports:
      - "80:80"
    environment:
      N8N_HOST: ${N8N_HOST:-n8n.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [secretar-net]

networks:
  secretar-net:
    driver: bridge

volumes:
  postgres-data:
  n8n-data:
  whisper-cache:
  caddy-data:
  caddy-config:
